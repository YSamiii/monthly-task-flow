<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="任务追踪" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <title>月度任务流入 / 完成追踪</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f3f4f6;
      --brand: #2563eb;
      --brand-soft: #dbeafe;
      --done: #059669;
      --done-soft: #d1fae5;
      --warn: #d97706;
      --warn-soft: #fef3c7;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, .08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(1380px, calc(100% - 28px));
      margin: 18px auto 44px;
    }

    header {
      background: linear-gradient(135deg, #ffffff 0%, #eef4ff 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: -0.04em;
    }

    .subtitle { margin-top: 4px; color: var(--muted); font-size: 14px; }

    .month-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .month-title {
      min-width: 150px;
      text-align: center;
      font-weight: 750;
      font-size: 18px;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 9px 12px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
    }
    .btn:hover { background: var(--soft); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn.primary:hover { background: #1d4ed8; }
    .btn.done { background: var(--done); color: #fff; border-color: var(--done); }
    .btn.ghost { background: transparent; }
    .btn.danger { color: var(--danger); border-color: #fecaca; background: #fff; }
    .btn.small { padding: 6px 8px; border-radius: 10px; font-size: 12px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { font-size: 24px; font-weight: 800; margin-top: 3px; }

    main {
      display: grid;
      grid-template-columns: minmax(360px, 1.05fr) minmax(420px, 1.45fr);
      gap: 16px;
      margin-top: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panel-title { font-weight: 800; }
    .panel-subtitle { color: var(--muted); font-size: 13px; }

    .calendar {
      padding: 14px;
    }

    .weekdays, .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding-bottom: 4px;
    }

    .day {
      min-height: 86px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .day.other { opacity: .38; }
    .day.today { border-color: var(--brand); }
    .day.selected { background: var(--brand-soft); border-color: var(--brand); box-shadow: inset 0 0 0 1px var(--brand); }
    .day-number { font-weight: 800; font-size: 14px; }
    .badges { display: grid; gap: 4px; }
    .badge {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
    }
    .badge.in { background: var(--brand-soft); color: #1e40af; }
    .badge.out { background: var(--done-soft); color: #047857; }

    .forms {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fafafa;
    }

    .form-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .form-card h3 { margin: 0 0 2px; font-size: 15px; }
    .field { display: grid; gap: 5px; }
    label { font-size: 12px; color: var(--muted); }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    textarea { min-height: 68px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

    .lists {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 420px;
    }
    .col {
      padding: 14px;
      min-width: 0;
    }
    .col + .col { border-left: 1px solid var(--line); }

    .col-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .col-title { font-weight: 800; }
    .count-pill {
      background: var(--soft);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .task-list { display: grid; gap: 8px; }
    .task {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 8px;
    }
    .task.completed { background: #fbfffd; border-color: #bbf7d0; }
    .task.ad-hoc { background: #fffcf5; border-color: #fde68a; }
    .task-title-line {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .task-title { font-weight: 750; line-height: 1.35; overflow-wrap: anywhere; }
    .task-meta {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      border-radius: 999px;
      background: var(--soft);
      padding: 3px 7px;
      line-height: 1;
    }
    .tag.none { background: var(--soft); color: var(--muted); }
    .tag.high { background: #fee2e2; color: #991b1b; }
    .tag.medium { background: var(--warn-soft); color: #92400e; }
    .tag.low { background: #e0f2fe; color: #075985; }
    .tag.done { background: var(--done-soft); color: #047857; }
    .tag.adhoc { background: var(--warn-soft); color: #92400e; }
    .task-note { color: #4b5563; font-size: 13px; white-space: pre-wrap; overflow-wrap: anywhere; }
    .task-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .backlog {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    .backlog-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .backlog-toolbar input { flex: 1; }

    .empty {
      color: var(--muted);
      background: #fafafa;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
      padding: 14px;
      font-size: 13px;
    }

    dialog {
      border: none;
      border-radius: 18px;
      width: min(520px, calc(100% - 28px));
      box-shadow: 0 25px 70px rgba(15,23,42,.2);
      padding: 0;
    }
    dialog::backdrop { background: rgba(15, 23, 42, .35); }
    .dialog-body { padding: 16px; display: grid; gap: 10px; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--line); }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 780px) {
      .app { width: min(100% - 18px, 1380px); margin-top: 10px; }
      header { border-radius: 18px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .forms, .lists { grid-template-columns: 1fr; }
      .col + .col { border-left: none; border-top: 1px solid var(--line); }
      .day { min-height: 72px; padding: 6px; }
      .badge { font-size: 11px; padding: 2px 5px; }
      .weekday { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <div>
          <h1>月度任务流入 / 完成追踪</h1>
          <div class="subtitle">每天看新增任务、完成任务、临时 done；完成后原 todo 仍保留在收到日期。</div>
        </div>
        <div class="month-controls">
          <button class="btn" id="prevMonth" type="button">← 上月</button>
          <div class="month-title" id="monthTitle"></div>
          <button class="btn" id="nextMonth" type="button">下月 →</button>
          <button class="btn primary" id="todayBtn" type="button">今天</button>
        </div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="toolbar">
        <button class="btn" id="exportCsv" type="button">导出 CSV</button>
        <button class="btn" id="exportJson" type="button">备份 JSON</button>
        <label class="btn" for="importJson" style="margin:0;">导入 JSON</label>
        <input id="importJson" type="file" accept="application/json" style="display:none" />
        <button class="btn danger" id="clearData" type="button">清空数据</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">月历</div>
            <div class="panel-subtitle">点选日期查看当天详情</div>
          </div>
        </div>
        <div class="calendar">
          <div class="weekdays">
            <div class="weekday">周一</div><div class="weekday">周二</div><div class="weekday">周三</div><div class="weekday">周四</div><div class="weekday">周五</div><div class="weekday">周六</div><div class="weekday">周日</div>
          </div>
          <div class="days" id="days"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="selectedTitle"></div>
            <div class="panel-subtitle" id="selectedSubtitle"></div>
          </div>
          <button class="btn small" id="copyDailySummary" type="button">复制当天摘要</button>
        </div>

        <div class="forms">
          <form class="form-card" id="addTaskForm">
            <h3>新增收到的任务</h3>
            <div class="field">
              <label for="taskTitle">任务名称</label>
              <input id="taskTitle" placeholder="例如：准备 HST 资料" required />
            </div>
            <div class="field">
              <label for="taskPriority">优先级</label>
              <select id="taskPriority">
                <option value="none" selected>无</option>
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
              </select>
            </div>
            <div class="field">
              <label for="taskNote">备注</label>
              <textarea id="taskNote" placeholder="可选"></textarea>
            </div>
            <button class="btn primary" type="submit">加入当天新增</button>
          </form>

          <form class="form-card" id="addDoneForm">
            <h3>直接记录完成</h3>
            <div class="field">
              <label for="doneTitle">完成事项</label>
              <input id="doneTitle" placeholder="例如：临时处理老板电话" required />
            </div>
            <div class="field">
              <label for="doneNote">备注</label>
              <textarea id="doneNote" placeholder="可选"></textarea>
            </div>
            <button class="btn done" type="submit">加入当天完成</button>
          </form>
        </div>

        <div class="lists">
          <div class="col">
            <div class="col-head">
              <div>
                <div class="col-title">当天新增 / 收到</div>
                <div class="panel-subtitle">完成后仍保留在这里</div>
              </div>
              <div class="count-pill" id="inCount"></div>
            </div>
            <div class="task-list" id="receivedList"></div>

            <div class="backlog">
              <div class="col-head">
                <div>
                  <div class="col-title">未完成任务池</div>
                  <div class="panel-subtitle">可把以前收到的任务完成到选中日期</div>
                </div>
                <div class="count-pill" id="backlogCount"></div>
              </div>
              <div class="backlog-toolbar">
                <input id="backlogSearch" placeholder="搜索未完成任务" />
              </div>
              <div class="task-list" id="backlogList"></div>
            </div>
          </div>

          <div class="col">
            <div class="col-head">
              <div>
                <div class="col-title">当天完成 / Done</div>
                <div class="panel-subtitle">包括计划内完成和直接补记 done</div>
              </div>
              <div class="count-pill" id="doneCount"></div>
            </div>
            <div class="task-list" id="doneList"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="editDialog">
    <form method="dialog">
      <div class="panel-head">
        <div class="panel-title">编辑任务</div>
      </div>
      <div class="dialog-body">
        <input type="hidden" id="editId" />
        <div class="field">
          <label for="editTitle">名称</label>
          <input id="editTitle" required />
        </div>
        <div class="field">
          <label for="editReceivedDate">收到日期</label>
          <input id="editReceivedDate" type="date" />
        </div>
        <div class="field">
          <label for="editCompletedDate">完成日期</label>
          <input id="editCompletedDate" type="date" />
        </div>
        <div class="field">
          <label for="editPriority">优先级</label>
          <select id="editPriority">
            <option value="none">无</option>
            <option value="high">高</option>
            <option value="medium">中</option>
            <option value="low">低</option>
          </select>
        </div>
        <div class="field">
          <label for="editNote">备注</label>
          <textarea id="editNote"></textarea>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="btn" value="cancel" type="button" id="cancelEdit">取消</button>
        <button class="btn primary" value="default" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script>
    const STORAGE_KEY = "monthly-task-flow-v1";
    const today = toDateKey(new Date());

    let state = loadState();
    let selectedDate = today;
    let viewYear = new Date().getFullYear();
    let viewMonth = new Date().getMonth();

    const els = {
      monthTitle: document.getElementById("monthTitle"),
      days: document.getElementById("days"),
      stats: document.getElementById("stats"),
      selectedTitle: document.getElementById("selectedTitle"),
      selectedSubtitle: document.getElementById("selectedSubtitle"),
      addTaskForm: document.getElementById("addTaskForm"),
      addDoneForm: document.getElementById("addDoneForm"),
      receivedList: document.getElementById("receivedList"),
      doneList: document.getElementById("doneList"),
      backlogList: document.getElementById("backlogList"),
      inCount: document.getElementById("inCount"),
      doneCount: document.getElementById("doneCount"),
      backlogCount: document.getElementById("backlogCount"),
      backlogSearch: document.getElementById("backlogSearch"),
      editDialog: document.getElementById("editDialog"),
      editId: document.getElementById("editId"),
      editTitle: document.getElementById("editTitle"),
      editReceivedDate: document.getElementById("editReceivedDate"),
      editCompletedDate: document.getElementById("editCompletedDate"),
      editPriority: document.getElementById("editPriority"),
      editNote: document.getElementById("editNote"),
    };

    document.getElementById("prevMonth").addEventListener("click", () => shiftMonth(-1));
    document.getElementById("nextMonth").addEventListener("click", () => shiftMonth(1));
    document.getElementById("todayBtn").addEventListener("click", () => {
      const now = new Date();
      viewYear = now.getFullYear();
      viewMonth = now.getMonth();
      selectedDate = today;
      render();
    });

    els.addTaskForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = document.getElementById("taskTitle").value.trim();
      if (!title) return;
      state.tasks.push({
        id: crypto.randomUUID(),
        title,
        receivedDate: selectedDate,
        completedDate: null,
        priority: document.getElementById("taskPriority").value,
        note: document.getElementById("taskNote").value.trim(),
        source: "planned",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      });
      e.target.reset();
      document.getElementById("taskPriority").value = "none";
      saveAndRender();
    });

    els.addDoneForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = document.getElementById("doneTitle").value.trim();
      if (!title) return;
      state.tasks.push({
        id: crypto.randomUUID(),
        title,
        receivedDate: null,
        completedDate: selectedDate,
        priority: "none",
        note: document.getElementById("doneNote").value.trim(),
        source: "adHoc",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      });
      e.target.reset();
      saveAndRender();
    });

    els.backlogSearch.addEventListener("input", renderLists);

    document.getElementById("copyDailySummary").addEventListener("click", async () => {
      const received = tasksForReceivedDate(selectedDate);
      const completed = tasksForCompletedDate(selectedDate);
      const text = [
        `${formatChineseDate(selectedDate)} 任务摘要`,
        `新增：${received.length}`,
        ...received.map(t => `- ${t.title}${t.completedDate ? `（已完成：${t.completedDate}）` : "（未完成）"}`),
        "",
        `完成：${completed.length}`,
        ...completed.map(t => `- ${t.title}${t.source === "adHoc" ? "（临时 done）" : ""}`)
      ].join("\n");
      try {
        await navigator.clipboard.writeText(text);
        toast("已复制当天摘要");
      } catch (_) {
        alert(text);
      }
    });

    document.getElementById("exportCsv").addEventListener("click", exportCsv);
    document.getElementById("exportJson").addEventListener("click", () => downloadFile(`task-flow-backup-${today}.json`, JSON.stringify(state, null, 2), "application/json"));
    document.getElementById("importJson").addEventListener("change", importJson);
    document.getElementById("clearData").addEventListener("click", () => {
      if (!confirm("确定要清空所有本地数据吗？此操作不能撤销。")) return;
      state = { tasks: [] };
      saveAndRender();
    });

    document.getElementById("cancelEdit").addEventListener("click", () => els.editDialog.close());
    els.editDialog.querySelector("form").addEventListener("submit", (e) => {
      e.preventDefault();
      const id = els.editId.value;
      const task = state.tasks.find(t => t.id === id);
      if (!task) return;
      task.title = els.editTitle.value.trim();
      task.receivedDate = els.editReceivedDate.value || null;
      task.completedDate = els.editCompletedDate.value || null;
      task.priority = els.editPriority.value;
      task.note = els.editNote.value.trim();
      task.source = task.receivedDate ? "planned" : "adHoc";
      task.updatedAt = new Date().toISOString();
      els.editDialog.close();
      saveAndRender();
    });

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { tasks: [] };
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed.tasks)) return { tasks: [] };
        return parsed;
      } catch (_) {
        return { tasks: [] };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function saveAndRender() {
      saveState();
      render();
    }

    function render() {
      renderHeader();
      renderCalendar();
      renderLists();
    }

    function renderHeader() {
      els.monthTitle.textContent = `${viewYear}年${viewMonth + 1}月`;
      const monthKey = `${viewYear}-${String(viewMonth + 1).padStart(2, "0")}`;
      const monthTasksIn = state.tasks.filter(t => t.receivedDate && t.receivedDate.startsWith(monthKey));
      const monthTasksDone = state.tasks.filter(t => t.completedDate && t.completedDate.startsWith(monthKey));
      const monthUnfinished = monthTasksIn.filter(t => !t.completedDate);
      const adHocDone = monthTasksDone.filter(t => t.source === "adHoc");
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const avgIn = (monthTasksIn.length / daysInMonth).toFixed(1);
      const avgDone = (monthTasksDone.length / daysInMonth).toFixed(1);

      const busiestIn = topDayInMonth("receivedDate", monthKey);
      const busiestDone = topDayInMonth("completedDate", monthKey);

      const statItems = [
        ["本月新增", monthTasksIn.length],
        ["本月完成", monthTasksDone.length],
        ["本月未完成", monthUnfinished.length],
        ["临时 done", adHocDone.length],
        ["日均新增", avgIn],
        ["日均完成", avgDone],
      ];
      els.stats.innerHTML = statItems.map(([label, value]) => `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>`).join("");
      els.selectedTitle.textContent = formatChineseDate(selectedDate);
      els.selectedSubtitle.textContent = `本月新增最多：${busiestIn.label}；完成最多：${busiestDone.label}`;
    }

    function renderCalendar() {
      els.days.innerHTML = "";
      const first = new Date(viewYear, viewMonth, 1);
      const mondayOffset = (first.getDay() + 6) % 7;
      const gridStart = new Date(viewYear, viewMonth, 1 - mondayOffset);
      for (let i = 0; i < 42; i++) {
        const d = new Date(gridStart);
        d.setDate(gridStart.getDate() + i);
        const key = toDateKey(d);
        const inCount = tasksForReceivedDate(key).length;
        const doneCount = tasksForCompletedDate(key).length;
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = [
          "day",
          d.getMonth() !== viewMonth ? "other" : "",
          key === today ? "today" : "",
          key === selectedDate ? "selected" : ""
        ].filter(Boolean).join(" ");
        cell.innerHTML = `
          <div class="day-number">${d.getDate()}</div>
          <div class="badges">
            <div class="badge in"><span>新增</span><strong>${inCount}</strong></div>
            <div class="badge out"><span>完成</span><strong>${doneCount}</strong></div>
          </div>
        `;
        cell.addEventListener("click", () => {
          selectedDate = key;
          viewYear = d.getFullYear();
          viewMonth = d.getMonth();
          render();
        });
        els.days.appendChild(cell);
      }
    }

    function renderLists() {
      const received = tasksForReceivedDate(selectedDate).sort(taskSort);
      const completed = tasksForCompletedDate(selectedDate).sort(taskSort);
      const query = els.backlogSearch.value.trim().toLowerCase();
      const backlog = state.tasks
        .filter(t => t.receivedDate && !t.completedDate)
        .filter(t => !query || `${t.title} ${t.note || ""}`.toLowerCase().includes(query))
        .sort((a,b) => a.receivedDate.localeCompare(b.receivedDate) || priorityRank(a.priority) - priorityRank(b.priority));

      els.inCount.textContent = `${received.length} 项`;
      els.doneCount.textContent = `${completed.length} 项`;
      els.backlogCount.textContent = `${backlog.length} 项`;
      els.receivedList.innerHTML = received.length ? received.map(t => taskCard(t, "received")).join("") : `<div class="empty">这一天还没有记录新增任务。</div>`;
      els.doneList.innerHTML = completed.length ? completed.map(t => taskCard(t, "done")).join("") : `<div class="empty">这一天还没有记录完成事项。</div>`;
      els.backlogList.innerHTML = backlog.length ? backlog.map(t => taskCard(t, "backlog")).join("") : `<div class="empty">没有匹配的未完成任务。</div>`;

      bindTaskActions();
    }

    function taskCard(t, context) {
      const classes = ["task", t.completedDate ? "completed" : "", t.source === "adHoc" ? "ad-hoc" : ""].filter(Boolean).join(" ");
      const priorityValue = t.priority || "none";
      const priorityLabel = { high: "高", medium: "中", low: "低", none: "无" }[priorityValue] || "无";
      const priorityTagText = priorityValue === "none" ? "无优先级" : `优先级 ${priorityLabel}`;
      const sourceTag = t.source === "adHoc" ? `<span class="tag adhoc">临时 done</span>` : `<span class="tag">计划任务</span>`;
      const doneTag = t.completedDate ? `<span class="tag done">已完成 ${t.completedDate}</span>` : `<span class="tag">未完成</span>`;
      const receivedTag = t.receivedDate ? `<span class="tag">收到 ${t.receivedDate}</span>` : "";
      const actions = [];
      if (!t.completedDate && t.receivedDate) {
        actions.push(`<button class="btn small done" data-action="complete" data-id="${t.id}">完成到选中日期</button>`);
      }
      if (t.completedDate && t.source !== "adHoc") {
        actions.push(`<button class="btn small" data-action="undo" data-id="${t.id}">取消完成</button>`);
      }
      actions.push(`<button class="btn small" data-action="edit" data-id="${t.id}">编辑</button>`);
      actions.push(`<button class="btn small danger" data-action="delete" data-id="${t.id}">删除</button>`);

      return `
        <article class="${classes}">
          <div class="task-title-line">
            <div class="task-title">${escapeHtml(t.title)}</div>
          </div>
          <div class="task-meta">
            <span class="tag ${priorityValue}">${priorityTagText}</span>
            ${sourceTag}
            ${receivedTag}
            ${doneTag}
          </div>
          ${t.note ? `<div class="task-note">${escapeHtml(t.note)}</div>` : ""}
          <div class="task-actions">${actions.join("")}</div>
        </article>
      `;
    }

    function bindTaskActions() {
      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", () => {
          const task = state.tasks.find(t => t.id === btn.dataset.id);
          if (!task) return;
          const action = btn.dataset.action;
          if (action === "complete") {
            task.completedDate = selectedDate;
            task.updatedAt = new Date().toISOString();
            saveAndRender();
          }
          if (action === "undo") {
            task.completedDate = null;
            task.updatedAt = new Date().toISOString();
            saveAndRender();
          }
          if (action === "delete") {
            if (!confirm(`删除“${task.title}”？`)) return;
            state.tasks = state.tasks.filter(t => t.id !== task.id);
            saveAndRender();
          }
          if (action === "edit") {
            openEditDialog(task);
          }
        });
      });
    }

    function openEditDialog(task) {
      els.editId.value = task.id;
      els.editTitle.value = task.title;
      els.editReceivedDate.value = task.receivedDate || "";
      els.editCompletedDate.value = task.completedDate || "";
      els.editPriority.value = task.priority || "none";
      els.editNote.value = task.note || "";
      els.editDialog.showModal();
    }

    function tasksForReceivedDate(dateKey) {
      return state.tasks.filter(t => t.receivedDate === dateKey);
    }

    function tasksForCompletedDate(dateKey) {
      return state.tasks.filter(t => t.completedDate === dateKey);
    }

    function shiftMonth(delta) {
      const d = new Date(viewYear, viewMonth + delta, 1);
      viewYear = d.getFullYear();
      viewMonth = d.getMonth();
      selectedDate = toDateKey(new Date(viewYear, viewMonth, Math.min(new Date(selectedDate + "T00:00:00").getDate(), new Date(viewYear, viewMonth + 1, 0).getDate())));
      render();
    }

    function taskSort(a,b) {
      return priorityRank(a.priority) - priorityRank(b.priority) || (a.createdAt || "").localeCompare(b.createdAt || "");
    }

    function priorityRank(p) {
      return { high: 0, medium: 1, low: 2, none: 3 }[p || "none"] ?? 3;
    }

    function topDayInMonth(field, monthKey) {
      const counts = new Map();
      state.tasks.forEach(t => {
        const d = t[field];
        if (d && d.startsWith(monthKey)) counts.set(d, (counts.get(d) || 0) + 1);
      });
      let best = null;
      for (const [date, count] of counts.entries()) {
        if (!best || count > best.count) best = { date, count };
      }
      if (!best) return { label: "暂无", count: 0 };
      return { label: `${Number(best.date.slice(-2))}日 ${best.count}项`, count: best.count };
    }

    function toDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatChineseDate(dateKey) {
      const [y, m, d] = dateKey.split("-").map(Number);
      const date = new Date(y, m - 1, d);
      const w = "日一二三四五六"[date.getDay()];
      return `${y}年${m}月${d}日 周${w}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[c]));
    }

    function exportCsv() {
      const rows = [["任务名称", "收到日期", "完成日期", "状态", "来源", "优先级", "备注", "创建时间", "更新时间"]];
      state.tasks.forEach(t => rows.push([
        t.title,
        t.receivedDate || "",
        t.completedDate || "",
        t.completedDate ? "已完成" : "未完成",
        t.source === "adHoc" ? "临时 done" : "计划任务",
        { high: "高", medium: "中", low: "低", none: "无" }[t.priority || "none"] || "无",
        t.note || "",
        t.createdAt || "",
        t.updatedAt || ""
      ]));
      const csv = rows.map(row => row.map(csvCell).join(",")).join("\n");
      downloadFile(`task-flow-${today}.csv`, "\ufeff" + csv, "text/csv;charset=utf-8");
    }

    function csvCell(value) {
      return `"${String(value).replace(/"/g, '""')}"`;
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importJson(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported.tasks)) throw new Error("Invalid file");
          if (!confirm("导入会覆盖当前本地数据。确定继续吗？")) return;
          state = { tasks: imported.tasks };
          saveAndRender();
          toast("导入完成");
        } catch (_) {
          alert("JSON 文件格式不正确。请导入本 app 导出的备份文件。");
        } finally {
          e.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    function toast(message) {
      const div = document.createElement("div");
      div.textContent = message;
      div.style.position = "fixed";
      div.style.left = "50%";
      div.style.bottom = "24px";
      div.style.transform = "translateX(-50%)";
      div.style.padding = "10px 14px";
      div.style.borderRadius = "999px";
      div.style.background = "#111827";
      div.style.color = "#fff";
      div.style.boxShadow = "0 10px 30px rgba(0,0,0,.18)";
      div.style.zIndex = "9999";
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 1600);
    }


    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    render();
  </script>
</body>
</html>
